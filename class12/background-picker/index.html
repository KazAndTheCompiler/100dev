<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Background picker with gradient themes and RGBa controls"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project One — Gradient Background Picker</title>

    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="page-title">Project One — Gradient Background Picker</h1>

      <section class="stage" aria-label="Background preview stage">
        <aside class="panel panel--left" aria-hidden="true"></aside>

        <div class="center">
          <img class="chair" src="img/chair.png" alt="Studio chair" />
        </div>

        <aside class="panel panel--right" aria-hidden="true"></aside>
      </section>

      <section class="remote" aria-label="Theme selector">
        <h2 class="section-title">Select Theme</h2>
        <ul class="color-list">
          <li>
            <button
              class="swatch swatch--purple"
              data-theme="purple"
              aria-label="Purple gradient theme"
            ></button>
          </li>
          <li>
            <button
              class="swatch swatch--green"
              data-theme="green"
              aria-label="Green gradient theme"
            ></button>
          </li>
          <li>
            <button
              class="swatch swatch--blue"
              data-theme="blue"
              aria-label="Blue gradient theme"
            ></button>
          </li>
        </ul>
        <p class="theme-code" id="themeCode"></p>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
