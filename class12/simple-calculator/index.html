<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">
    	<meta name="description" content="Practice calculator-style functions">
    	<meta name="keywords" content="calculator, functions, numbers">

		<title>Simple Calculator</title>

		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<main class="app">
			<h1>Simple Calculator</h1>
			<ul class="buttons">
				<li><button id="pumpkin" type="button">Reset</button></li>
				<li><button id="dominosPizza" type="button">+3</button></li>
				<li><button id="zebra" type="button">+9</button></li>
				<li><button id="cantThinkOfAnything" type="button">-2</button></li>
			</ul>
			<h2>Result: <span id="placeToPutResult">0</span></h2>
			<button id="runExamplesBtn" type="button">Run 10 Examples</button>
			<pre id="history" aria-live="polite"></pre>
		</main>

		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
