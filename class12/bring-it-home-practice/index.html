<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">
    	<meta name="description" content="Practice core JS variables, functions, and conditionals">
    	<meta name="keywords" content="practice, javascript, functions">
		<title>Bring It Home Practice</title>
		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<main class="app">
			<h1>Bring It Home Practice</h1>
			<p>Use the buttons to run each exercise.</p>
			<section class="controls">
				<button id="showVariable" type="button">Show Variable +10</button>
				<button id="subtractBtn" type="button">Subtract 4 Numbers</button>
				<button id="remainderBtn" type="button">Get Remainder</button>
				<button id="jumanjiBtn" type="button">Check Jumanji Rule</button>
				<button id="zebraBtn" type="button">Check Zebra Rule</button>
				<button id="runExamplesBtn" type="button">Run 10 Examples</button>
			</section>
			<h2>Result</h2>
			<p id="output" aria-live="polite"></p>
			<pre id="examples"></pre>
		</main>
		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
