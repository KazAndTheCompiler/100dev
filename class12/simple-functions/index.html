<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">
    	<meta name="description" content="Practice simple JS functions">
    	<meta name="keywords" content="javascript, functions, basics">

		<title>Simple Functions</title>

		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<main class="app">
			<h1>Simple Functions</h1>
			<p>Try one function at a time or run all 10 function-use examples.</p>

			<section class="controls">
				<button id="addBtn" type="button">Add 7 + 5</button>
				<button id="multiplyBtn" type="button">Multiply 2 × 3 × 4</button>
				<button id="divideBtn" type="button">Divide 10 / 4</button>
				<button id="runExamplesBtn" type="button">Run 10 Examples</button>
			</section>

			<h2>Result</h2>
			<pre id="output" aria-live="polite"></pre>
		</main>

		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
