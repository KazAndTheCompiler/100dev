<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">
    	<meta name="description" content="This app simulates when your parental unit is really mad at you">
    	<meta name="keywords" content="mom, dad, yell">
		<title>Angry Parent Simulator</title>
		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<main class="app">
			<h1>YOU DONE MESSED UP</h1>
			<label for="firstName">First Name:</label><input id="firstName" type="text" placeholder="First Name">
			<label for="firstMiddle">First Middle Name:</label><input id="firstMiddle" type="text" placeholder="First Middle Name">
			<label for="lastMiddle">Last Middle Name:</label><input id="lastMiddle" type="text" placeholder="Last Middle Name">
			<label for="lastName">Last Name:</label><input id="lastName" type="text" placeholder="Last Name">
			<button id="yell" type="button" name="button">YELL</button>
			<h2 id="placeToYell"></h2>
			<button id="runExamplesBtn" type="button">Run 10 Examples</button>
			<pre id="examples"></pre>
		</main>
		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
