<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1e00"/>
      <stop offset="100%" stop-color="#1f0e00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Antenna -->
  <rect x="30" y="6" width="4" height="10" rx="2" fill="#a84800"/>
  <circle cx="32" cy="5" r="4" fill="#00ff88" filter="url(#glow)"/>

  <!-- Head -->
  <rect x="14" y="15" width="36" height="26" rx="7" fill="#7a3a00"/>

  <!-- Left leaf -->
  <path d="M16 20 C8 14 3 16 4 22 C9 20 13 21 16 26 Z" fill="#2db865" opacity="0.9"/>
  <!-- Right leaf -->
  <path d="M48 20 C56 14 61 16 60 22 C55 20 51 21 48 26 Z" fill="#2db865" opacity="0.9"/>

  <!-- Eyes -->
  <rect x="18" y="21" width="12" height="8" rx="3" fill="#00ff88" filter="url(#glow)" opacity="0.95"/>
  <rect x="34" y="21" width="12" height="8" rx="3" fill="#00ff88" filter="url(#glow)" opacity="0.95"/>
  <!-- Eye shines -->
  <circle cx="22" cy="24" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="38" cy="24" r="2" fill="#fff" opacity="0.6"/>

  <!-- Smile -->
  <path d="M22 33 Q32 38 42 33" stroke="#00ff88" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Neck -->
  <rect x="28" y="40" width="8" height="5" rx="2" fill="#a84800"/>

  <!-- Body -->
  <rect x="18" y="44" width="28" height="14" rx="5" fill="#7a3a00"/>
  <!-- Chest dot -->
  <circle cx="32" cy="51" r="3" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>

  <!-- Legs -->
  <rect x="22" y="57" width="7" height="5" rx="2.5" fill="#a84800"/>
  <rect x="35" y="57" width="7" height="5" rx="2.5" fill="#a84800"/>
</svg>
